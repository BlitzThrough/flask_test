{ % extends "base.html" % % }

{ % block content % }
<head><title>Items List</title></head>
    <h1>Items List</h1>
    <a href="{{ url_for('create') }}" class="btn btn-primary mb-3">Create New Item</a>
    <ul class="list-group">
        {% for item in items %}
            <li class="list-group-item d-flex justify-content-between align-items-center">
                {{ item.name }}
                <div>
                    <a href="{{ url_for('update', item_id=item.id) }}" class="btn btn-sm btn-warning">Edit</a>
                    <form action="{{ url_for('delete', item_id=item.id) }}" method="POST" style="display:inline;">
                        <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                    </form>
                </div>
            </li>
        {% endfor %}
    </ul>
{ % endblock % }
